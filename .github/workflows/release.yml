name: Build & Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm install

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euxo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          security create-keychain -p "ci" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12

          curl -sL -o $RUNNER_TEMP/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -sL -o $RUNNER_TEMP/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security import $RUNNER_TEMP/DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Inject notarize teamId
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          set -e
          missing=""
          [ -z "$APPLE_TEAM_ID" ] && missing="$missing APPLE_TEAM_ID"
          [ -z "$APPLE_ID" ]      && missing="$missing APPLE_ID"
          [ -z "$APPLE_PASSWORD" ] && missing="$missing APPLE_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required notarization secret(s):$missing"
            exit 1
          fi
          awk -v team="$APPLE_TEAM_ID" '
            /^mac:$/ { print; print "  notarize:"; print "    teamId: " team; next }
            { print }
          ' electron-builder.yml > electron-builder.yml.tmp && mv electron-builder.yml.tmp electron-builder.yml
          echo "--- electron-builder.yml ---"
          cat electron-builder.yml

      - name: Build for macOS (${{ matrix.arch }})
        env:
          CSC_KEYCHAIN: ${{ runner.temp }}/build.keychain-db
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          security unlock-keychain -p "ci" "$CSC_KEYCHAIN"
          npm run build -- --mac --${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip

  release:
    needs: build-mac
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-x64
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: mac-arm64
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
