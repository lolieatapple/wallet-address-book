appId: xyz.arieswallet.wallet.address.book
productName: Wallet Address Book
copyright: Copyright © 2022 lolieatapple
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
mac:
  category: public.app-category.utilities
  artifactName: Wallet-Address-Book-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip
publish: null
